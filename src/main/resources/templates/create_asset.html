<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create Asset</title>
</head>
<body>

<h2>Create Asset</h2>

<form action="/assets" method="post">

    <label>Name</label>
    <input type="text" name="name" required>
    <br><br>

    <button type="submit">Create</button>

</form>

</body>
</html>
