<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h2>Assets</h2>

<ul>
    <li th:each="asset : ${assets}">
        <a th:href="@{/assets/{id}(id=${asset.id})}">
            <span th:text="${asset.id}"></span>
            -
            <span th:text="${asset.name}"></span>
        </a>
    </li>
</ul>
</body>
</html>
