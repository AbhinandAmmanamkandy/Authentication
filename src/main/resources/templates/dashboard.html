<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h2>Assets</h2>

<ul>
    <li th:each="asset : ${assets}">
        <a th:href="@{/dashboard/view/{id}(id=${asset.id})}">
            <span th:text="${asset.id}"></span>
            -
            <span th:text="${asset.name}"></span>
        </a>
    </li>
</ul>
<a href="/dashboard/create">Create Asset</a>
<form th:action="@{/auth/logout}" method="post">
    <button type="submit">Logout</button>
</form>
</body>
</html>
